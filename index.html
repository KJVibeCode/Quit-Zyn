<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zyn Quit Tracker</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --muted: #94a3b8;
      --text: #f8fafc;
      --accent: #22c55e;
      --danger: #ef4444;
      --border: #334155;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #020617, var(--bg));
      color: var(--text);
      padding: 18px;
    }
    .app {
      max-width: 520px;
      margin: 0 auto;
    }
    h1 {
      font-size: 28px;
      margin: 8px 0 4px;
    }
    .sub {
      color: var(--muted);
      margin-bottom: 18px;
    }
    .card {
      background: rgba(17, 24, 39, 0.92);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 12px 28px rgba(0,0,0,.25);
    }
    .timer {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-top: 8px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .metric {
      background: #020617;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }
    .metric .label {
      color: var(--muted);
      font-size: 13px;
    }
    .metric .value {
      font-size: 22px;
      font-weight: 700;
      margin-top: 4px;
    }
    button, input, select, textarea {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--border);
      padding: 13px;
      font-size: 16px;
      color: var(--text);
      background: #020617;
    }
    button {
      border: none;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
    }
    .green { background: var(--accent); color: #052e16; }
    .red { background: var(--danger); color: #fff; }
    .gray { background: #334155; color: #fff; }
    label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin: 12px 0 6px;
    }
    textarea { min-height: 78px; resize: vertical; }
    .row {
      display: flex;
      gap: 10px;
    }
    .row > * { flex: 1; }
    .hidden { display: none; }
    .log {
      border-top: 1px solid var(--border);
      padding-top: 12px;
      margin-top: 12px;
    }
    .entry {
      background: #020617;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      margin-top: 10px;
    }
    .entry small {
      color: var(--muted);
    }
    .quote {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Zyn Quit Tracker</h1>
    <div class="sub">Cold turkey tracker for 6mg pouches.</div>

    <div class="card">
      <div class="quote">Time nicotine-free</div>
      <div class="timer" id="timer">0d 0h 0m</div>
      <button class="red" onclick="showRelapseForm()">I Folded</button>
      <button class="green" onclick="startCravingTimer()">Craving Timer: Survive 10 Minutes</button>
    </div>

    <div class="grid">
      <div class="metric">
        <div class="label">Longest streak</div>
        <div class="value" id="longestStreak">0d</div>
      </div>
      <div class="metric">
        <div class="label">Folds logged</div>
        <div class="value" id="foldCount">0</div>
      </div>
      <div class="metric">
        <div class="label">Nicotine avoided</div>
        <div class="value" id="nicAvoided">0mg</div>
      </div>
      <div class="metric">
        <div class="label">Pouches avoided</div>
        <div class="value" id="pouchAvoided">0</div>
      </div>
    </div>

    <div class="card hidden" id="cravingCard">
      <h2>Ride the wave</h2>
      <div class="timer" id="cravingTimer">10:00</div>
      <div class="quote">Drink water. Walk. Chew gum. Do anything except negotiate with the craving.</div>
      <button class="gray" onclick="stopCravingTimer()">Close Timer</button>
    </div>

    <div class="card hidden" id="relapseForm">
      <h2>Log the Fold</h2>

      <label>How many 6mg pouches?</label>
      <input id="pouches" type="number" min="1" value="1" />

      <label>Trigger</label>
      <select id="trigger">
        <option>Stress</option>
        <option>Boredom</option>
        <option>Driving</option>
        <option>After eating</option>
        <option>After coffee</option>
        <option>Work</option>
        <option>Alcohol/social</option>
        <option>Night craving</option>
        <option>Other</option>
      </select>

      <label>Craving intensity: 1-10</label>
      <input id="intensity" type="number" min="1" max="10" value="7" />

      <label>Notes</label>
      <textarea id="notes" placeholder="What happened right before you used?"></textarea>

      <div class="row">
        <button class="red" onclick="logRelapse()">Save Fold</button>
        <button class="gray" onclick="hideRelapseForm()">Cancel</button>
      </div>
    </div>

    <div class="card">
      <h2>Settings</h2>
      <label>Baseline pouches/day</label>
      <input id="baseline" type="number" min="1" value="10" />

      <label>Cost per can</label>
      <input id="costPerCan" type="number" min="0" step="0.01" value="5.50" />

      <label>Pouches per can</label>
      <input id="pouchesPerCan" type="number" min="1" value="15" />

      <button class="green" onclick="saveSettings()">Save Settings</button>
      <button class="gray" onclick="resetQuitDate()">Reset Quit Start to Now</button>
    </div>

    <div class="card">
      <h2>Fold History</h2>
      <div id="history" class="log"></div>
    </div>
  </div>

<script>
  const MG_PER_POUCH = 6;
  let data = JSON.parse(localStorage.getItem("zynQuitData")) || {
    quitStart: new Date().toISOString(),
    baseline: 10,
    costPerCan: 5.50,
    pouchesPerCan: 15,
    relapses: [],
    longestMs: 0
  };

  let cravingInterval = null;

  function save() {
    localStorage.setItem("zynQuitData", JSON.stringify(data));
  }

  function elapsedMs() {
    return Date.now() - new Date(data.quitStart).getTime();
  }

  function formatDuration(ms) {
    const totalMin = Math.max(0, Math.floor(ms / 60000));
    const d = Math.floor(totalMin / 1440);
    const h = Math.floor((totalMin % 1440) / 60);
    const m = totalMin % 60;
    return `${d}d ${h}h ${m}m`;
  }

  function updateDashboard() {
    const ms = elapsedMs();
    document.getElementById("timer").textContent = formatDuration(ms);

    if (ms > data.longestMs) {
      data.longestMs = ms;
      save();
    }

    const daysClean = ms / (1000 * 60 * 60 * 24);
    const avoidedPouches = Math.floor(daysClean * data.baseline);
    const avoidedMg = avoidedPouches * MG_PER_POUCH;

    document.getElementById("longestStreak").textContent = formatDuration(data.longestMs);
    document.getElementById("foldCount").textContent = data.relapses.length;
    document.getElementById("nicAvoided").textContent = `${avoidedMg}mg`;
    document.getElementById("pouchAvoided").textContent = avoidedPouches;

    document.getElementById("baseline").value = data.baseline;
    document.getElementById("costPerCan").value = data.costPerCan;
    document.getElementById("pouchesPerCan").value = data.pouchesPerCan;

    renderHistory();
  }

  function showRelapseForm() {
    document.getElementById("relapseForm").classList.remove("hidden");
  }

  function hideRelapseForm() {
    document.getElementById("relapseForm").classList.add("hidden");
  }

  function logRelapse() {
    const pouches = Number(document.getElementById("pouches").value || 1);
    const trigger = document.getElementById("trigger").value;
    const intensity = Number(document.getElementById("intensity").value || 0);
    const notes = document.getElementById("notes").value;

    data.relapses.unshift({
      date: new Date().toISOString(),
      pouches,
      nicotineMg: pouches * MG_PER_POUCH,
      trigger,
      intensity,
      notes,
      streakBeforeFold: elapsedMs()
    });

    data.quitStart = new Date().toISOString();
    document.getElementById("notes").value = "";
    hideRelapseForm();
    save();
    updateDashboard();
  }

  function renderHistory() {
    const history = document.getElementById("history");
    if (data.relapses.length === 0) {
      history.innerHTML = `<div class="quote">No folds logged yet. Keep it that way.</div>`;
      return;
    }

    history.innerHTML = data.relapses.map(r => `
      <div class="entry">
        <strong>${new Date(r.date).toLocaleString()}</strong><br/>
        <small>Streak before fold: ${formatDuration(r.streakBeforeFold)}</small><br/>
        ${r.pouches} pouch(es), ${r.nicotineMg}mg nicotine<br/>
        Trigger: ${r.trigger} | Intensity: ${r.intensity}/10
        ${r.notes ? `<br/><small>${r.notes}</small>` : ""}
      </div>
    `).join("");
  }

  function saveSettings() {
    data.baseline = Number(document.getElementById("baseline").value || 10);
    data.costPerCan = Number(document.getElementById("costPerCan").value || 5.50);
    data.pouchesPerCan = Number(document.getElementById("pouchesPerCan").value || 15);
    save();
    updateDashboard();
  }

  function resetQuitDate() {
    if (!confirm("Reset your quit start time to now? This does not delete fold history.")) return;
    data.quitStart = new Date().toISOString();
    save();
    updateDashboard();
  }

  function startCravingTimer() {
    document.getElementById("cravingCard").classList.remove("hidden");
    let seconds = 600;
    clearInterval(cravingInterval);

    cravingInterval = setInterval(() => {
      seconds--;
      const min = String(Math.floor(seconds / 60)).padStart(2, "0");
      const sec = String(seconds % 60).padStart(2, "0");
      document.getElementById("cravingTimer").textContent = `${min}:${sec}`;

      if (seconds <= 0) {
        clearInterval(cravingInterval);
        document.getElementById("cravingTimer").textContent = "You beat that craving.";
      }
    }, 1000);
  }

  function stopCravingTimer() {
    clearInterval(cravingInterval);
    document.getElementById("cravingCard").classList.add("hidden");
    document.getElementById("cravingTimer").textContent = "10:00";
  }

  setInterval(updateDashboard, 1000);
  updateDashboard();
</script>
</body>
</html>
